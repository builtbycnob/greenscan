name: Dead Man's Switch
on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 1h after pipeline (04:00 UTC)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Check pipeline health
        id: health
        run: |
          uv run python -c "
          import asyncio, sys
          from pipeline.storage.db import Database

          async def check():
              async with Database() as db:
                  ran = await db.pipeline_ran_today()
                  brief = await db.get_todays_brief()
                  count = await db.get_signal_count(days=1)

                  if not ran:
                      print('ALERT: Pipeline did not run today')
                      sys.exit(1)

                  if brief is None and count > 0:
                      print(f'ALERT: Pipeline ran, {count} signals found, but no brief generated')
                      sys.exit(1)

                  if brief is None and count == 0:
                      print('OK: Pipeline ran, no new signals (all deduped), no brief expected')
                      sys.exit(0)

                  print(f'OK: Brief generated at {brief[\"generated_at\"]}')
                  print(f'Signals today: {count}')

          asyncio.run(check())
          "
        env:
          GROQ_API_KEY: dummy
          CEREBRAS_API_KEY: dummy
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="⚠️ GreenScan Dead Man's Switch: Pipeline health check failed. Check GitHub Actions."
