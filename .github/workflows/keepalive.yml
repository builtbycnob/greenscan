name: Keep Alive
on:
  schedule:
    - cron: '0 12 1 * *'  # 1st of each month at noon UTC
  workflow_dispatch:

# Prevents GitHub from disabling cron workflows after 60 days of repo inactivity.
# A push to the default branch resets the inactivity timer.

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update keepalive timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/.keepalive
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/.keepalive
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
